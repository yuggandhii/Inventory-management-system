services:
  - type: web
    name: coreinventory-backend
    runtime: node
    rootDir: backend-yug
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: coreinventory-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: FRONTEND_URL
        value: https://coreinventory-frontend.onrender.com

  - type: web
    name: coreinventory-frontend
    runtime: static
    rootDir: frontend-yug
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://coreinventory-backend.onrender.com/api

databases:
  - name: coreinventory-db
    plan: free
